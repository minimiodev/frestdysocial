<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mất kết nối mạng - Frest</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-primary: #070709;
            --bg-secondary: #0e0e11;
            --bg-tertiary: #16161d;
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 35%, #60a5fa 70%, #ffffff 100%);
            --accent-glow: rgba(59, 130, 246, 0.25);
            --radius-md: 18px;
            --radius-full: 9999px;
            --font-primary: 'Inter', sans-serif;
            --font-heading: 'Be Vietnam Pro', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-primary);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 24px;
            width: 100%;
            max-width: 420px;
        }

        .offline-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: var(--radius-md);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: var(--accent-primary);
            font-size: 32px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0.05); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2); }
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }

        .btn-retry {
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            border-radius: var(--radius-full);
            height: 44px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-glow);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .btn-retry:hover {
            opacity: 0.9;
        }

        .btn-retry:active {
            transform: scale(0.98);
        }

        /* Ambient glows background */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <div class="offline-card">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
                    <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
                    <path d="M7.34 16.7a14.59 14.59 0 0 1 2.32-1.3"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                    <path d="M9.76 4.24a18.86 18.86 0 0 1 4.48 0"></path>
                </svg>
            </div>
            <h1>Không có kết nối mạng</h1>
            <p>Không thể truy cập Frest vào lúc này. Vui lòng kiểm tra lại đường truyền internet của bạn.</p>
            <button class="btn-retry" onclick="window.location.reload();">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Thử tải lại trang
            </button>
        </div>
    </div>
</body>
</html>
